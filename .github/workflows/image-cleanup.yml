name: Cleanup Images

on:
  workflow_run:
    workflows:
      [
        "Build & Push Image",
        "Build & Push Dev Image",
        "Build & Push Image via Command",
      ]
    types:
      - completed
  workflow_dispatch:

jobs:
  update:
    uses: codeshelldev/gh-actions/.github/workflows/image-cleanup.yml@main
    name: Images
    with:
      registry: ghcr.io
      cleanup-stales: pr-*,ci-*,*-dev
      stale-threshold: 15 days
    secrets:
      GH_PCKG_TOKEN: ${{ secrets.GH_PCKG_TOKEN }}
