name: Update README

on:
  workflow_run:
    workflows: ["Build & Push Image"]
    types:
      - completed
  workflow_dispatch:

jobs:
  update:
    uses: codeshelldev/gh-actions/.github/workflows/readme-update.yml@main
    name: Update
    with:
      output-branch: main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
