# Example Config (all configurations shown)
service:
  logLevel: info
  port: 8880
  hostnames:
    - mydomain.com

api:
  url: http://signal-api:8080
  tokens: [token1, token2]
  auth:
    methods: [bearer, basic, body]
    tokens:
      - set: [pathToken1, pathToken2]
        methods: [path]
      - set: [queryAndBodyToken]
        methods: [body, query]

settings:
  http:
    responseHeaders:
      X-Custom: "xyz"

  message:
    templating:
      messageTemplate: |
        You've got a Notification:
        {{ @message }} 
        At {{ @data.timestamp }} on {{ @data.date }}.
        Send using {{ .NUMBER }}.

    variables:
      number: "+123400001"
      recipients: ["+123400002", "group.id", "user.id"]
      text_mode: "${{ .env.TEXT_MODE }}"

    fieldMappings:
      "@message":
        - field: "msg"
          score: 100

  access:
    trustedIPs:
      - 192.168.1.10

    trustedProxies:
      - 172.20.0.100

    ipFilter:
      allowed:
        - 192.168.1.10
        - 192.168.2.0/24
      blocked:
        - 192.168.2.44

    endpoints:
      allowed:
        - pattern: /v2/send
        - pattern: /v1/receive/${{ .vars.NUMBER }}
      blocked:
        - pattern: /v1/about
        - pattern: /v1/receive/[^0]+
          matchType: regex

    rateLimiting:
      limit: 100
      period: 1h

    fieldPolicies:
      "@number":
        - value: "+123400003"
          action: block
        - value: "+12340000[4-9]"
          matchType: regex
          action: block

    cors:
      methods: [GET, POST]
      headers: ["Content-Type", "Accept-Language"]
      origins:
        - url: "https://domain.com"
          methods: [GET]
          headers: ["Content-Type"]
