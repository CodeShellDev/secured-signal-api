api:
  auth:
    methods: [bearer, basic, body]

service:
  port: 8880
  logLevel: info

settings:
  message:
    fieldMappings:
      "@message":
        [
          { field: msg, score: 100 },
          { field: content, score: 99 },
          { field: description, score: 98 },
          { field: text, score: 20 },
          { field: summary, score: 15 },
          { field: details, score: 14 },

          { field: data.message, score: 10 },
          { field: data.content, score: 9 },
          { field: data.description, score: 8 },
          { field: data.text, score: 7 },
          { field: data.summary, score: 6 },
          { field: data.details, score: 5 },

          { field: body, score: 2 },
          { field: data, score: 1 },
        ]

    scheduling:
      enabled: true

    templating:
      body: true
      path: true
      query: true

    injecting:
      urlToBody:
        query: true
        path: true

  access:
    endpoints:
      blocked:
        - pattern: /v1/configuration
          matchType: prefix
        - pattern: /v1/devices
          matchType: prefix
        - pattern: /v1/register
          matchType: prefix
        - pattern: /v1/unregister
          matchType: prefix
        - pattern: /v1/qrcodelink
          matchType: prefix
        - pattern: /v1/accounts
          matchType: prefix
        - pattern: /v1/contacts
          matchType: prefix

    cors:
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers:
        [
          "Content-Type",
          "Content-Language",
          "Authorization",
          "Accept",
          "Accept-Language",
        ]
